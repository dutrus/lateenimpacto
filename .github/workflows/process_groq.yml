name: Enriquecer oportunidades con Groq

on:
  # Corre automáticamente cada 12 horas (6 AM y 6 PM UTC)
  schedule:
    - cron: "0 6,18 * * *"

  # Permite disparo manual desde la pestaña Actions de GitHub
  workflow_dispatch:

jobs:
  process:
    name: Procesar oportunidades pendientes
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: automation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: automation/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Correr process_groq.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node process_groq.js
